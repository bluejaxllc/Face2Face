<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
         integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
         crossorigin=""/>
    <title>Bump and Grind</title>
    <style>
      /* Critical styles in head to avoid FOUC */
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        position: fixed;
        width: 100%;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
      }
      
      #root {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        overflow-y: scroll;
        -webkit-overflow-scrolling: touch;
      }
      
      /* Basic scroll bar visibility */
      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      
      ::-webkit-scrollbar-thumb {
        background: rgba(0,0,0,0.2);
        border-radius: 10px;
      }
      
      /* For Firefox */
      * {
        scrollbar-width: thin;
        scrollbar-color: rgba(0,0,0,0.2) transparent;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- This script injects a replit badge into the page, please feel free to remove this line -->
    <script type="text/javascript" src="https://replit.com/public/js/replit-badge-v3.js"></script>
    <script>
      // Android Scroll Fix
      document.addEventListener('DOMContentLoaded', function() {
        // Detect Android by checking for userAgent and WebKit but not Safari or iPhone
        const isAndroid = /Android/.test(navigator.userAgent) && 
                          /WebKit/.test(navigator.userAgent) && 
                          !/Safari/.test(navigator.userAgent) && 
                          !/iPhone/.test(navigator.userAgent);
        
        if (isAndroid) {
          // Add a helper class to the body
          document.body.classList.add('android-device');
          
          // Force repaints on scroll to fix rendering issues
          document.addEventListener('scroll', function(e) {
            if (e.target.classList && e.target.classList.contains('scroll-container')) {
              e.target.style.transform = 'translateZ(0)';
              setTimeout(function() {
                e.target.style.transform = '';
              }, 0);
            }
          }, true);
        }
      });
    </script>
  </body>
</html>
