<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <script>
    // CRITICAL: Force kill any stale Service Workers from previous PWA setup
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) {
          registration.unregister();
          console.log("Stale Service Worker unregistered.");
        }
      }).catch(function(err) {
        console.log('Service Worker unregistration failed: ', err);
      });
    }

    // Failsafe error catcher right in the HTML
    window.addEventListener('error', function(e) {
      if (!window.hasShownError) {
        document.body.innerHTML = '<div style="background:#000;color:red;padding:20px;font-family:monospace;font-size:14px;word-break:break-all;"><b>FATAL DOMAIN ERROR:</b><br/>' + (e.message || String(e)) + '<br/>File: ' + e.filename + '<br/>Line: ' + e.lineno + '</div>';
        window.hasShownError = true;
      }
    });

    // ONSCREEN CONSOLE LOGGER
    document.addEventListener("DOMContentLoaded", () => {
      setTimeout(() => {
        if (!document.getElementById('root') || document.getElementById('root').innerHTML.includes('App is loading')) {
          const div = document.createElement('div');
          div.setAttribute('style', 'position:fixed;top:0;left:0;width:100vw;height:50vh;background:rgba(0,0,0,0.9);color:#0f0;font-family:monospace;font-size:11px;z-index:999999;overflow-y:auto;padding:10px;');
          div.id = 'osk';
          div.innerHTML = '<b>ONSCREEN CONSOLE ENABLED:</b><br/>';
          document.body.appendChild(div);

          const log = (type, ...args) => {
            const osk = document.getElementById('osk');
            if (osk) {
              const msg = args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ');
              osk.innerHTML += `<div style="color:${type==='error'?'#f44':'#0f0'}">[${type}] ${msg}</div>`;
              osk.scrollTop = osk.scrollHeight;
            }
          };

          const oe = console.error, ow = console.warn, ol = console.log;
          console.error = function(...args) { log('error', ...args); oe.apply(console, args); };
          console.warn = function(...args) { log('warn', ...args); ow.apply(console, args); };
          console.log = function(...args) { log('log', ...args); ol.apply(console, args); };
        }
      }, 500); // give app 500ms to mount, if not, show console
    });
  </script>
  <meta name="theme-color" content="#0B0F19" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&display=swap"
    rel="stylesheet">
  <title>Face2Face — Meet Real People Nearby</title>
  <link rel="canonical" href="https://face2face-production-11ee.up.railway.app/" />
  <meta name="description"
    content="Face2Face connects you with real people nearby. No bots, no fake profiles — just genuine face-to-face connections." />
  <meta property="og:title" content="Face2Face — Meet Real People Nearby" />
  <meta property="og:description"
    content="Location-based connections with real, verified people. No bots, no inactive profiles." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Face2Face" />
  <meta name="twitter:description" content="Meet real people nearby. No bots, no fake profiles." />
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='28' font-size='28'%3E👥%3C/text%3E%3C/svg%3E" />
  <style>
    /* Critical styles in head to avoid FOUC */
    html,
    body {
      height: 100dvh;
      margin: 0;
      padding: 0;
      width: 100%;
    }

    .auth-page {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      position: relative;
      height: 100dvh;
      min-height: 100dvh;
    }

    .map-view {
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100dvh;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    #root {
      width: 100%;
      height: 100dvh;
    }

    /* Root inherits fixed positioning for map view */
    .map-view #root {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
    }

    /* Root allows scrolling for auth pages */
    .auth-page #root {
      position: relative;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* Basic scroll bar visibility */
    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.2);
      border-radius: 10px;
    }

    /* For Firefox */
    * {
      scrollbar-width: thin;
      scrollbar-color: rgba(148, 163, 184, 0.2) transparent;
    }

    /* Prevent content from being hidden under keyboard on mobile */
    @media (max-width: 640px) {
      html {
        height: 100dvh;
      }

      body {
        width: 100%;
        height: 100dvh;
        min-height: 100dvh;
        overflow: hidden;
      }

      body.ios-device #root,
      body.android-device #root {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        overflow: hidden;
      }
    }
  </style>
</head>

<body>
  <div id="root">
    <div style="color: white; padding: 20px; text-align: center; font-family: sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; background: #000;">
      <h2 style="color:#fff; font-size: 24px;">App is loading...</h2>
      <p style="color:#888;">If you see this for more than a few seconds, JavaScript failed to execute.</p>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    // DIAGNOSTIC: If the module script silently fails, this will catch it
    // Module scripts on custom domains can be silently blocked by CDN/proxy
    setTimeout(function() {
      var root = document.getElementById('root');
      if (root && root.innerHTML.indexOf('App is loading') !== -1) {
        // App didn't mount after 3 seconds — the module script failed silently
        // Try to fetch the JS bundle to see what the browser actually gets
        var scripts = document.querySelectorAll('link[rel="modulepreload"], script[type="module"][src]');
        var jsUrl = '';
        scripts.forEach(function(s) { if (s.src) jsUrl = s.src; });
        
        root.innerHTML = '<div style="color:#0f0;padding:15px;font-family:monospace;font-size:11px;background:#000;min-height:100vh;word-break:break-all;">' +
          '<b>MODULE SCRIPT FAILED - DIAGNOSTICS:</b><br/>' +
          'Script URL: ' + jsUrl + '<br/>' +
          'Page URL: ' + location.href + '<br/>' +
          'User Agent: ' + navigator.userAgent + '<br/><br/>' +
          '<b>Fetching JS bundle directly...</b><br/></div>';

        // Now fetch the JS file to see what happens
        fetch(jsUrl || '/assets/').then(function(r) {
          var info = 'Fetch Status: ' + r.status + '<br/>' +
            'Content-Type: ' + r.headers.get('content-type') + '<br/>' +
            'Content-Length: ' + r.headers.get('content-length') + '<br/>';
          root.querySelector('div').innerHTML += info;
          return r.text();
        }).then(function(text) {
          var first100 = text.substring(0, 200).replace(/</g, '&lt;');
          root.querySelector('div').innerHTML += 'First 200 chars: <code>' + first100 + '</code><br/><br/>';
          
          // Check if we got HTML instead of JS
          if (text.indexOf('<!DOCTYPE') !== -1 || text.indexOf('<html') !== -1) {
            root.querySelector('div').innerHTML += '<span style="color:red;font-size:14px"><b>CRITICAL: Server returned HTML instead of JavaScript!</b><br/>The CDN/proxy is serving the wrong file.</span>';
          } else {
            root.querySelector('div').innerHTML += '<span style="color:yellow"><b>JS file looks correct but module execution failed.</b><br/>Likely a CORS or CSP policy issue on this domain.</span>';
          }
        }).catch(function(e) {
          root.querySelector('div').innerHTML += '<span style="color:red">Fetch Error: ' + e.message + '</span>';
        });
      }
    }, 3000);
  </script>
  <script>
    // Mobile device optimizations
    document.addEventListener('DOMContentLoaded', function () {
      // Detect mobile devices
      const isMobile = /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

      // Add specific classes for different platforms
      if (isMobile) {
        document.body.classList.add('mobile-device');

        // Special handling for Android
        if (/Android/.test(navigator.userAgent)) {
          document.body.classList.add('android-device');

          // Add the scroll-container class to scrollable elements on auth page
          document.querySelectorAll('.auth-page').forEach(function (el) {
            el.classList.add('scroll-container');
          });

          // Force repaints on scroll to fix rendering issues on Android
          document.addEventListener('scroll', function (e) {
            // Check if the element or any of its parents has the scroll-container class
            let target = e.target;
            let isScrollContainer = false;

            while (target && target.classList) {
              if (target.classList.contains('scroll-container') ||
                target.classList.contains('auth-page')) {
                isScrollContainer = true;
                break;
              }
              target = target.parentElement;
            }

            if (isScrollContainer) {
              target.style.transform = 'translateZ(0)';
              setTimeout(function () {
                target.style.transform = '';
              }, 0);
            }
          }, true);
        }

        // Special handling for iOS
        if (/iPhone|iPad|iPod/.test(navigator.userAgent)) {
          document.body.classList.add('ios-device');

          // Add momentum scrolling to scrollable elements
          document.querySelectorAll('.auth-page, .scroll-container').forEach(function (el) {
            el.style.WebkitOverflowScrolling = 'touch';
          });
        }
      }
    });
  </script>
</body>

</html>
