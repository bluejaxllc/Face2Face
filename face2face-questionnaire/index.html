<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face 2 Face - Beta Waitlist</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #0a0f1d;
            --bg-card: rgba(17, 24, 39, 0.7);
            --primary-accent: #3b82f6; /* blue-500 */
            --primary-glow: rgba(59, 130, 246, 0.5);
            --secondary-accent: #a855f7; /* purple-500 */
            --secondary-glow: rgba(168, 85, 247, 0.4);
            --pink-accent: #ec4899; /* pink-500 */
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --border-glow: rgba(148, 163, 184, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, var(--primary-glow) 0%, transparent 25%),
                radial-gradient(circle at 85% 30%, var(--secondary-glow) 0%, transparent 25%);
            animation: bgShift 20s ease-in-out infinite alternate;
        }

        @keyframes bgShift {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        /* Glassmorphism background circles */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: float 10s ease-in-out infinite;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: var(--primary-accent);
            top: -100px;
            left: -100px;
            opacity: 0.3;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: var(--secondary-accent);
            bottom: -150px;
            right: -100px;
            opacity: 0.2;
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            z-index: 10;
        }

        .glass-panel {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glow);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(168, 85, 247, 0.2));
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            margin-bottom: 1.5rem;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
            animation: pulse-glow 3s infinite alternate;
        }

        .logo-icon i {
            color: #fff;
            width: 32px;
            height: 32px;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); transform: scale(1); }
            100% { box-shadow: 0 0 40px rgba(168, 85, 247, 0.5); transform: scale(1.05); }
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #60a5fa, #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.5;
            max-width: 90%;
            margin: 0 auto;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 20px;
            height: 20px;
            transition: color 0.3s ease;
        }

        input {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1rem 1rem 1rem 3rem;
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        input::placeholder {
            color: rgba(148, 163, 184, 0.5);
        }

        input:focus {
            border-color: rgba(96, 165, 250, 0.5);
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        input:focus + i, input:focus ~ i {
            color: var(--primary-accent);
        }

        .submit-btn {
            background: linear-gradient(to right, #2563eb, #9333ea);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 1.1rem;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 1.05rem;
            cursor: pointer;
            margin-top: 0.5rem;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.4);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(147, 51, 234, 0.5);
            background: linear-gradient(to right, #3b82f6, #a855f7);
        }

        .submit-btn:active {
            transform: translateY(1px);
        }

        .submit-btn .arrow {
            transition: transform 0.3s ease;
        }

        .submit-btn:hover .arrow {
            transform: translateX(4px);
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            color: #ef4444;
            font-size: 0.85rem;
            text-align: center;
            margin-top: -0.5rem;
            min-height: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .error-message.show {
            opacity: 1;
        }

        /* Success state */
        .success-state {
            display: none;
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.3);
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <div class="glass-panel" id="form-panel">
            <div class="header">
                <div class="logo-icon">
                    <i data-lucide="sparkles"></i>
                </div>
                <h1>Face 2 Face Beta</h1>
                <p class="subtitle">Join the waitlist to test our revolutionary real-world matching platform.</p>
            </div>

            <form id="waitlist-form">
                <div class="input-group">
                    <i data-lucide="user"></i>
                    <input type="text" id="name" placeholder="Full Name (Required)" required autocomplete="name">
                </div>

                <div class="input-group">
                    <i data-lucide="mail"></i>
                    <input type="email" id="email" placeholder="Email Address (Required)" required autocomplete="email">
                </div>

                <div class="input-group">
                    <i data-lucide="phone"></i>
                    <input type="tel" id="phone" placeholder="Phone Number (Optional)" autocomplete="tel">
                </div>

                <div class="input-group">
                    <i data-lucide="link"></i>
                    <input type="url" id="socialLink" placeholder="Social Media Link (Optional)">
                </div>

                <div id="error-alert" class="error-message"></div>

                <button type="submit" class="submit-btn" id="submit-btn">
                    <span class="btn-text">Apply Now</span>
                    <i data-lucide="arrow-right" class="arrow"></i>
                    <div class="loader" id="loader"></div>
                </button>
            </form>
        </div>

        <div class="glass-panel success-state" id="success-panel">
            <div class="success-icon">
                <i data-lucide="check" style="width: 40px; height: 40px;"></i>
            </div>
            <h1>You're on the list!</h1>
            <p class="subtitle" style="margin-bottom: 2rem;">Thank you for applying. Please complete the quick questionnaire to secure your spot.</p>
            <div class="loader" style="display: block; margin: 0 auto;"></div>
            <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 1rem;">Redirecting...</p>
        </div>
    </div>

    <script>
        // Initialize icons
        lucide.createIcons();

        const form = document.getElementById('waitlist-form');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.querySelector('.btn-text');
        const arrow = document.querySelector('.arrow');
        const loader = document.getElementById('loader');
        const errorAlert = document.getElementById('error-alert');
        const formPanel = document.getElementById('form-panel');
        const successPanel = document.getElementById('success-panel');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // UI Loading state
            btnText.style.display = 'none';
            arrow.style.display = 'none';
            loader.style.display = 'block';
            submitBtn.disabled = true;
            errorAlert.classList.remove('show');

            const payload = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                socialLink: document.getElementById('socialLink').value
            };

            try {
                const response = await fetch('https://face2face-production-11ee.up.railway.app/api/waitlist', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    // Show success state
                    formPanel.style.display = 'none';
                    successPanel.style.display = 'block';
                    
                    // Delay and redirect to questionnaire
                    setTimeout(() => {
                        window.location.href = 'questionnaire.html';
                    }, 2500);
                } else {
                    const data = await response.json();
                    throw new Error(data.message || 'Failed to join the waitlist.');
                }
            } catch (error) {
                console.error('Error:', error);
                errorAlert.textContent = error.message === 'Failed to fetch' 
                    ? 'Network error. Please try again later.' 
                    : error.message;
                errorAlert.classList.add('show');
                
                // Reset button
                btnText.style.display = 'block';
                arrow.style.display = 'block';
                loader.style.display = 'none';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
